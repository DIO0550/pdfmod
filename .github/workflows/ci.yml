name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Test with Coverage
        run: pnpm test:run --coverage

      - name: Build
        run: pnpm build

      - name: Upload Coverage
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 1

  coverage-comment:
    needs: ci
    if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Download Coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-summary

      - name: Post Coverage Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read coverage data
            const summaryPath = 'coverage-summary.json';
            if (!fs.existsSync(summaryPath)) {
              core.warning('coverage-summary.json not found, skipping coverage comment');
              return;
            }
            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const total = summary.total;

            // Emoji based on coverage percentage
            const coverageEmoji = (pct) => {
              if (pct >= 80) return '🟢';
              if (pct >= 60) return '🟡';
              return '🔴';
            };

            // Badge color based on coverage percentage
            const badgeColor = (pct) => {
              if (pct >= 80) return 'brightgreen';
              if (pct >= 60) return 'yellow';
              return 'red';
            };

            // Summary badges
            const categories = ['lines', 'branches', 'functions', 'statements'];
            const badges = categories.map(cat => {
              const pct = total[cat].pct;
              const label = cat.charAt(0).toUpperCase() + cat.slice(1);
              return `![${label}](https://img.shields.io/badge/${label}-${pct}%25-${badgeColor(pct)})`;
            }).join(' ');

            // Summary table
            const summaryTable = [
              '| Category | Coverage |',
              '|----------|----------|',
              ...categories.map(cat => {
                const pct = total[cat].pct;
                return `| ${cat.charAt(0).toUpperCase() + cat.slice(1)} | ${coverageEmoji(pct)} ${pct.toFixed(2)}% |`;
              })
            ].join('\n');

            // File details from coverage-summary.json (exclude config files, test files, barrel index files)
            const excludePatterns = [/\.config\./, /\.test\./, /\/index\.ts$/];
            const fmt = (pct) => `${pct.toFixed(1)}% ${coverageEmoji(pct)}`;
            const fileRows = Object.entries(summary)
              .filter(([filePath]) => filePath !== 'total' && !excludePatterns.some(p => p.test(filePath)))
              .map(([filePath, data]) => {
                const displayPath = filePath.replace(process.cwd() + '/', '');
                return `| \`${displayPath}\` | ${fmt(data.lines.pct)} | ${fmt(data.branches.pct)} | ${fmt(data.functions.pct)} | ${fmt(data.statements.pct)} |`;
              });

            const fileDetails = fileRows.length > 0 ? [
              '<details>',
              '<summary>File Details</summary>',
              '',
              '| File | Lines | Branches | Functions | Statements |',
              '|------|-------|----------|-----------|------------|',
              ...fileRows,
              '',
              '</details>'
            ].join('\n') : '';

            const marker = '<!-- ci-coverage-report -->';
            const body = [
              marker,
              '## Coverage Report',
              '',
              badges,
              '',
              summaryTable,
              '',
              fileDetails,
              '',
              '> Generated by CI workflow'
            ].join('\n');

            // Find existing comment with marker (paginate to handle 30+ comments)
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
