name: CI

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Test with Coverage
        run: pnpm test:run --coverage

      - name: Build
        run: pnpm build

      - name: Coverage PR Comment
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read coverage data
            const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const final = JSON.parse(fs.readFileSync('coverage/coverage-final.json', 'utf8'));
            const total = summary.total;

            // Emoji based on coverage percentage
            const coverageEmoji = (pct) => {
              if (pct >= 80) return '🟢';
              if (pct >= 60) return '🟡';
              return '🔴';
            };

            // Badge color based on coverage percentage
            const badgeColor = (pct) => {
              if (pct >= 80) return 'brightgreen';
              if (pct >= 60) return 'yellow';
              return 'red';
            };

            // Summary badges
            const categories = ['lines', 'branches', 'functions', 'statements'];
            const badges = categories.map(cat => {
              const pct = total[cat].pct;
              const label = cat.charAt(0).toUpperCase() + cat.slice(1);
              return `![${label}](https://img.shields.io/badge/${label}-${pct}%25-${badgeColor(pct)})`;
            }).join(' ');

            // Summary table
            const summaryTable = [
              '| Category | Coverage | |',
              '|----------|----------|:-:|',
              ...categories.map(cat => {
                const pct = total[cat].pct;
                return `| ${cat.charAt(0).toUpperCase() + cat.slice(1)} | ${pct.toFixed(2)}% | ${coverageEmoji(pct)} |`;
              })
            ].join('\n');

            // File details (exclude config files, test files, barrel index files)
            const excludePatterns = [/\.config\./, /\.test\./, /\/index\.ts$/];
            const fileRows = Object.entries(final)
              .filter(([filePath]) => !excludePatterns.some(p => p.test(filePath)))
              .map(([filePath, data]) => {
                const s = data.s || {};
                const b = data.b || {};
                const f = data.f || {};

                const stmtTotal = Object.keys(s).length;
                const stmtCovered = Object.values(s).filter(v => v > 0).length;
                const stmtPct = stmtTotal > 0 ? ((stmtCovered / stmtTotal) * 100).toFixed(1) : 'N/A';

                const branchTotal = Object.values(b).flat().length;
                const branchCovered = Object.values(b).flat().filter(v => v > 0).length;
                const branchPct = branchTotal > 0 ? ((branchCovered / branchTotal) * 100).toFixed(1) : 'N/A';

                const fnTotal = Object.keys(f).length;
                const fnCovered = Object.values(f).filter(v => v > 0).length;
                const fnPct = fnTotal > 0 ? ((fnCovered / fnTotal) * 100).toFixed(1) : 'N/A';

                // Use relative path from workspace root
                const displayPath = filePath.replace(process.cwd() + '/', '');
                return `| \`${displayPath}\` | ${stmtPct}% | ${branchPct}% | ${fnPct}% | ${stmtPct}% |`;
              });

            const fileDetails = fileRows.length > 0 ? [
              '<details>',
              '<summary>File Details</summary>',
              '',
              '| File | Lines | Branches | Functions | Statements |',
              '|------|-------|----------|-----------|------------|',
              ...fileRows,
              '',
              '</details>'
            ].join('\n') : '';

            const marker = '<!-- ci-coverage-report -->';
            const body = [
              marker,
              '## Coverage Report',
              '',
              badges,
              '',
              summaryTable,
              '',
              fileDetails,
              '',
              '> Generated by CI workflow'
            ].join('\n');

            // Find existing comment with marker
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
